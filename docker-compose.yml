services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taskflow-backend
    restart: unless-stopped
    volumes:
      - backend-storage:/var/www/storage/app/public
    env_file:
      - ./backend/.env
    depends_on:
      - redis
    networks:
      - taskflow

  nginx:
    image: nginx:alpine
    container_name: taskflow-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./backend/public:/var/www/public:ro
      - backend-storage:/var/www/storage/app/public:ro
    depends_on:
      - backend
    networks:
      - taskflow

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: taskflow-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - taskflow

  redis:
    image: redis:7-alpine
    container_name: taskflow-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - taskflow

networks:
  taskflow:
    driver: bridge

volumes:
  backend-storage:
  redis-data:
